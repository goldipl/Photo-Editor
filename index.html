<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PhotoEdit — Image Editor</title>
<link rel="shortcut icon" href="./img/favicon.jpg" type="image/x-icon">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@500;600;700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<link rel="stylesheet" href="./css/style.css">
</head>
<body>

<div class="app-shell">

  <!-- TOP BAR -->
  <div class="topbar">
    <div class="brand">
      <div class="brand-mark"><i class="fa-solid fa-wand-magic-sparkles"></i></div>
      <div class="brand-text">PhotoEdit.
        <span>Fast, clean image editing</span>
      </div>
    </div>
    <div class="topbar-actions">
      <button class="pill-btn"><i class="fa-solid fa-share-nodes"></i> Share</button>
      <button class="pill-btn solid" id="save-btn-top"><i class="fa-solid fa-download"></i> Export</button>
    </div>
  </div>

  <div class="editor-grid">

    <!-- LEFT PANEL -->
    <div class="panel-left">

      <div>
        <div class="section-label"><i class="fa-solid fa-image"></i> Image</div>
        <div class="upload-card add-image-btn">
          <i class="fa-solid fa-cloud-arrow-up"></i>
          <p>Upload a photo</p>
          <small>PNG, JPG up to 10MB</small>
        </div>
        <input type="file" id="file-upload" accept="image/*">
      </div>

      <div>
        <div class="section-label"><i class="fa-solid fa-sliders"></i> Filters</div>
        <div class="filters_container filter-grid">
          <button class="filter-chip brightness active"><i class="fa-solid fa-sun"></i>Brightness</button>
          <button class="filter-chip saturation"><i class="fa-solid fa-droplet"></i>Saturation</button>
          <button class="filter-chip inversion"><i class="fa-solid fa-circle-half-stroke"></i>Invert</button>
          <button class="filter-chip grayscale"><i class="fa-solid fa-circle-notch"></i>Grayscale</button>
          <button class="filter-chip blur"><i class="fa-solid fa-water"></i>Blur</button>
          <button class="filter-chip contrast"><i class="fa-solid fa-circle-half-stroke"></i>Contrast</button>
        </div>
      </div>

      <div class="range_container">
        <div class="range-card">
          <div class="range-head range_info">
            <span class="name range-title">Brightness</span>
            <span class="value range-value">100%</span>
          </div>
          <input type="range" min="0" max="200" value="100">
        </div>
      </div>

      <div>
        <div class="section-label"><i class="fa-solid fa-rotate"></i> Transform</div>
        <div class="other_options_container transform-row">
          <button class="icon-btn rotate-left"><i class="fa-solid fa-rotate-left"></i>Left</button>
          <button class="icon-btn rotate-right"><i class="fa-solid fa-rotate-right"></i>Right</button>
          <button class="icon-btn flip-horizontal"><i class="fa-solid fa-arrows-up-down"></i>Flip V</button>
          <button class="icon-btn flip-vertical"><i class="fa-solid fa-arrows-left-right"></i>Flip H</button>
        </div>
      </div>

      <div class="left_buttons_container" style="margin-top:auto;">
        <button class="reset-link reset-btn"><i class="fa-solid fa-arrow-rotate-left"></i> Reset all edits</button>
      </div>

    </div>

    <!-- RIGHT / CANVAS -->
    <div class="panel-right right_container">
      <div class="canvas-frame image_container">
        <div class="empty-state">
          <i class="fa-regular fa-image"></i>
          <p>No image yet</p>
          <small>Upload a photo to start editing</small>
        </div>
        <img id="show-img" src="" alt="">
      </div>

      <div class="right_buttons_container bottom-actions">
        <button class="btn-primary ghost" id="reset-btn-bottom"><i class="fa-solid fa-rotate-left"></i></button>
        <button class="btn-primary save-image-btn"><i class="fa-solid fa-download"></i> Save Image</button>
      </div>
    </div>

  </div>
</div>

<script src="./js/script.js"></script>

</body>
</html>
